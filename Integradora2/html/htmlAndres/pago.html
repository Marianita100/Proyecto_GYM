<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pago en línea</title>
<link rel="stylesheet" href="../../css/cssAndres/pago_linea.css">
</head>

<body>

<div class="contenedor">

    <h1>PAGO EN LÍNEA</h1>

    <div class="card-neon">

        <label><strong>Selecciona tu membresía</strong></label><br><br>

        <label>
            <input type="radio" name="membresia" value="Clasica"
                onchange="actualizarResumen('Clasica', '$900', '6 meses')">
            Clasica
        </label><br><br>

        <label>
            <input type="radio" name="membresia" value="vip"
                onchange="actualizarResumen('VIP', '$1500', '1 año')">
            VIP
        </label><br><br>

        <p><strong>Membresía:</strong> <span id="resMembresia">No seleccionada</span></p>
        <p><strong>Precio:</strong> <span id="resPrecio">-</span></p>
        <p><strong>Duración:</strong> <span id="resDuracion">-</span></p>

        <div id="errorMembresia" style="color:red; margin-top:10px;"></div>

    </div>

    <!-- ===== FORMULARIO ===== -->
    <!-- =====  <form action="Confirma_pago.html" method="GET" onsubmit="return validarFormulario()">===== -->
       <form action="../../guardar_pago.php" method="POST" onsubmit="return validarFormulario()">

        <div class="card-neon">

            <label><strong>Selecciona tu tipo de tarjeta</strong></label><br><br>

            <label>
                <input type="radio" name="tipoTarjeta" value="debito" required>
                Débito
            </label>

            <label style="margin-left:20px;">
                <input type="radio" name="tipoTarjeta" value="credito">
                Crédito
            </label>

            <br><br>

            <label>Número de tarjeta</label>
            <input type="text" id="numeroTarjeta"
                placeholder="16 dígitos"
                maxlength="16"
                oninput="this.value = this.value.replace(/[^0-9]/g,'')"
                required>

            <label>Nombre del titular</label>
            <input type="text" required>

            <div style="display:flex; gap:20px;">

                <div style="flex:1;">
                    <label>Fecha de vencimiento</label>
                    <input type="text" placeholder="MM/AA" required>
                </div>

                <div style="flex:1;">
                    <label>CVV</label>
                    <input type="password"
                        maxlength="3"
                        oninput="this.value = this.value.replace(/[^0-9]/g,'')"
                        required>
                </div>

            </div>

        </div>

        <!-- ===== BOTONES ===== -->
        <div class="botones">
            <button type="button" class="btn-secundario"
                onclick="window.location.href='../InicioScreen.html'">
                Regresar
            </button>

            <button type="submit" class="btn-neon">
                Confirmar pago
            </button>
        </div>

    </form>

</div>

</body>
</html>



<script>

function actualizarResumen(nombre, precio, duracion){
    document.getElementById("resMembresia").textContent = nombre;
    document.getElementById("resPrecio").textContent = precio;
    document.getElementById("resDuracion").textContent = duracion;
    document.getElementById("errorMembresia").textContent = "";
}

function validarFormulario(){

    const membresia = document.querySelector('input[name="membresia"]:checked');

    if(!membresia){
        document.getElementById("errorMembresia").textContent =
            "⚠ Debes seleccionar una membresía.";
        return false;
    }

    return confirm("¿Deseas confirmar el pago?");
}

</script>

</body>
</html>
