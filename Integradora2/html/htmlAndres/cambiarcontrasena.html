<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Cambia tu contraseña</title>
        <link rel="stylesheet" href="../../css/cssAndres/estilo.css">
        <script src="../js/jsAndres/password.js"></script>
        <link rel="icon" href="../../img/imgAndres/logogim.jpeg">
    </head>

    <body>
        <div class="barra">Cambia tu contraseña</div>
        <img src="../../img/imgAndres/logogim.jpeg" class="logo-top" alt="Logo H2Gym">
        
        <div class="contenedor">
            <div class="panel">
               <form action="../../actualizar_password.php" method="POST" autocomplete="off" onsubmit="validarPasswords(event)">

                    <div class="campo">
                        <label class="titulo-form">Ingresa tu correo registrado</label>
                        <input type="email" name="correo" placeholder="ejemplo@correo.com" required 
                               style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: none;">
                    </div>

                    <div class="campo">
                        <label class="titulo-form">Ingresa tu nueva contraseña</label>
                        <div class="password-campo">
                            <input type="password" id="password" name="password" placeholder="Nueva contraseña" autocomplete="new-password" required>
                            <span class="ojo" onclick="verPassword(this, 'password')" data-visible="false">👁‍🗨</span>
                        </div>
                    </div>

                    <div class="campo">
                        <label>Repite la contraseña</label>
                        <div class="password-campo">
                            <input type="password" id="confirmar" placeholder="Confirmar contraseña" autocomplete="new-password" required>
                            <span class="ojo" onclick="verPassword(this, 'confirmar')" data-visible="false">👁‍🗨</span>
                        </div>
                    </div>

                    <div class="botones">
                        <button type="button" class="btn salir" onclick="history.back()">Salir</button>
                        <button type="submit" class="btn cambiar">Cambiar</button>
                    </div>

                    <p id="mensaje-exito" style="display:none; color: #ffffff; font-weight: bold;">
                        ✔ Contraseña cambiada correctamente
                    </p>
                    <p id="mensaje-error-js" style="display:none; color: #ffffff; font-weight: bold;">
                        ✖ Las contraseñas no coinciden
                    </p>
                </form>
            </div>
        </div>

        <script>
            function verPassword(icon, id) {
                const input = document.getElementById(id);
                if (icon.dataset.visible === "false") {
                    input.type = "text";
                    icon.textContent = "👁";
                    icon.dataset.visible = "true";
                } else {
                    input.type = "password";
                    icon.textContent = "👁‍🗨";
                    icon.dataset.visible = "false";
                }
            }

            function validarPasswords(event) {
                const pass = document.getElementById('password').value;
                const conf = document.getElementById('confirmar').value;
                const errorMsg = document.getElementById('mensaje-error-js');

                if (pass !== conf) {
                    event.preventDefault(); // Detiene el envío al PHP
                    errorMsg.style.display = 'block';
                } else {
                    errorMsg.style.display = 'none';
                }
            }
        </script>
    </body>
</html>
