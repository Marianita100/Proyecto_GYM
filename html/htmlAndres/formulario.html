<!DOCTYPE html>
<html>
    <head>
        <title>H2Gym</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../../css/cssAndres/formulario.css">
    </head>

    <body>
        <div class="layout">
            <div class="carta">
                <h2>CREAR CUENTA </h2>
            </div>

            <div class="login-container">
                <form action="../../registro.php" method="POST">
                    <fieldset>
                        <label>Nombre completo</label>
                        <input type="text" required placeholder="Ingresa tu nombre completo"  name="nombre" required>

                        <label>Correo</label>
                        <input type="email" required placeholder="Ingresa tu correo" name="correo" required>

                        <label>Contraseña</label>
                        <input type="password" minlength="8" placeholder="Crea una contraseña"  name="password" required>

                        <label>Confirmar contraseña</label>
                        <input type="password" minlength="8" placeholder="Confirma tu contraseña">

                        

                        <input type="reset" value="Cancelar" onclick="history.back()">
                        <input type="submit" value="Crear cuenta">



                    </fieldset>
                </form>
            </div>

        </div>

        <img src="../img/imgAndres/logogim.jpeg" class="logo-top" alt="Logo H2Gym">
    </body>
</html>
