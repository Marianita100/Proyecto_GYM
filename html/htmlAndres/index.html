             border-radius: 8px;
             margin: 8px;
             background: rgba(0,0,0,0.4);
           "
           onmouseover="this.style.background='rgba(255,0,0,0.7)'"

           Crear cuenta
        </a>

             border-radius: 8px;
             margin: 8px;
             background: rgba(0,0,0,0.4);

           onmouseout="this.style.background='rgba(0,0,0,0.4)'">

        <a href="cambiarcontrasena.html"

             text-decoration: none;
             padding: 10px 24px;
             border: 1px solid rgba(255,255,255,0.6);
             border-radius: 8px;
             margin: 8px;
             background: rgba(0,0,0,0.4);
           "
           onmouseover="this.style.background='rgba(255,0,0,0.7)'"
           onmouseout="this.style.background='rgba(0,0,0,0.4)'">
           Cambiar contraseña
        </a>

        <a href="pago.html"
           style="
             color: white;
             font-size: 22px;
             text-decoration: none;
             padding: 10px 24px;
             border: 1px solid rgba(255,255,255,0.6);
             border-radius: 8px;
             margin: 8px;
             background: rgba(0,0,0,0.4);
           "
           onmouseover="this.style.background='rgba(255,0,0,0.7)'"
           onmouseout="this.style.background='rgba(0,0,0,0.4)'">
            formas de pago</a>
        
        
             <a href="Confirma_pago.html"
           style="
             color: white;
             font-size: 22px;

             padding: 10px 24px;
