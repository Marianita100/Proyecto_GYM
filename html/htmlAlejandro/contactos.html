<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthy Heart Gym - Contacto</title>
    <link rel="stylesheet" href="../../css/cssAlejandro/contactos.css">
      <link rel="stylesheet" href="../../css/cssAndres/estilo.css">
    <link rel="icon" href="../../img/imgAndres/logogim.jpeg">
     
</head>
<body>
    <img src="../../img/imgAndres/logogim.jpeg" class="logo-top" alt="Logo H2Gym">
    <div class="container contact-container">
        <header>
            <h1>Healthy Heart Gym</h1>
            <h2>Contactos</h2>
        </header>

        <main class="contact-grid">
            <section class="form-section">
           <form action="../../guardar_contacto.php" method="POST" >
            <div id="mensajeExito" style="display:none; color:lightgreen; margin-bottom:10px;">
✅ Mensaje enviado correctamente
</div>
                    <div class="input-group">
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
                    </div>

                    <div class="input-group">
                        <label for="correo">Correo:</label>
                        <input type="email" id="correo" name="correo" placeholder="tu@correo.com" required>
                    </div>

                    <div class="input-group">
                        <label for="mensaje">Mensaje:</label>
                        <textarea id="mensaje" name="mensaje" rows="4" placeholder="¿En qué podemos ayudarte?" required></textarea>
                    </div>

                    <div class="button-container">
                        <button type="submit" class="btn-cancel">Enviar mensaje</button>
                    </div>
                </form>
            </section>

            <section class="info-section">
                <div class="info-item">
                    <label>Teléfono:</label>
                    <p>55-1234-5678</p>
                </div>
                <div class="info-item">
                    <label>Dirección:</label>
                    <p>calle 5 colonia del pitirijas</p>
                </div>
                <div class="map-container">
                    <label>Mapa:</label>
                    <div class="map-placeholder">
            <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3744.123456!2d-98.944321!3d20.268910!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjDCsDE2JzA4LjEiTiA5OMKwNTYnMzkuNiJX!5e0!3m2!1ses-419!2smx!4v1700000000000!5m2!1ses-419!2smx" 
        width="100%" 
        height="100%" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
    </iframe>
                    </div>
                </div>
            </section>
        </main>

        <div class="footer-buttons">
            <button type="button" class="btn-back" onclick="history.back()">Regresar</button>
        </div>
    </div>
    <script>
const params = new URLSearchParams(window.location.search);

if(params.get("enviado") === "1"){
    document.getElementById("mensajeExito").style.display = "block";
}
</script>
    <script>
document.querySelector("form").addEventListener("submit", function(){
    setTimeout(function(){
        document.querySelector("form").reset();
    }, 100);
});
</script>
</body>
</html>
